<!DOCTYPE html>
<html>
<head>
    <title>Placement Predictor</title>
</head>
<body>

    <h2>Placement Prediction</h2>

    <form action="/predict" method="post">
        <label>CGPA:</label><br>
        <input type="text" name="cgpa" required><br><br>

        <label>IQ:</label><br>
        <input type="text" name="iq" required><br><br>

        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>

</body>
</html>
